---
- name: Prepare all Debian nodes
  hosts: honeypot_host
  gather_facts: false
  pre_tasks:
    - name: Wait for SSH and Python availability
      ansible.builtin.wait_for_connection:
        timeout: 300
        sleep: 5

    - name: Gather facts
      ansible.builtin.setup:
  roles:
    - role: common
    - role: docker
    - role: stack
